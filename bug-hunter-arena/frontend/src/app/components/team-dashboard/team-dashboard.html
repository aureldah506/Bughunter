<div class="min-h-screen bg-[#0f0f1a] text-slate-200 font-sans p-6 md:p-12 relative overflow-hidden">
  
  <div class="absolute top-0 right-0 w-96 h-96 bg-purple-500/10 blur-[120px] rounded-full pointer-events-none"></div>

  <div class="max-w-5xl mx-auto flex justify-between items-center mb-12 relative z-10">
    <div class="flex items-center gap-4">
      <div class="h-12 w-12 rounded-xl bg-cyan-500/20 border border-cyan-500/30 flex items-center justify-center">
        <iconify-icon icon="solar:shield-check-linear" class="text-2xl text-cyan-400"></iconify-icon>
      </div>
      <div>
        <h1 class="text-3xl font-bold text-white tracking-tight">{{ team?.name }}</h1>
        <p class="text-sm text-cyan-400 font-medium tracking-widest uppercase mt-1">Escouade Active</p>
      </div>
    </div>
    
    <div class="bg-[#161625] border border-white/10 px-6 py-3 rounded-2xl flex items-center gap-4 shadow-lg">
      <span class="text-slate-400 text-sm font-medium uppercase tracking-wider">Score</span>
      <span class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-cyan-400">{{ team?.score }}</span>
    </div>
  </div>

  <div class="max-w-5xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8 relative z-10">
    
    <div class="lg:col-span-2 bg-[#161625] border border-white/5 rounded-3xl p-8 flex flex-col items-center justify-center text-center shadow-2xl relative overflow-hidden group">
      <iconify-icon icon="solar:cpu-bolt-line-duotone" class="text-7xl text-slate-700 mb-6 group-hover:text-cyan-400 transition-colors duration-500"></iconify-icon>
      <h2 class="text-2xl font-semibold text-white mb-4">Système prêt.</h2>
      <p class="text-slate-400 max-w-md mx-auto mb-8">Lancez l'analyse pour identifier une anomalie logicielle aléatoire.</p>
      
      <button (click)="spinWheel()" [disabled]="isLoading"
              class="relative inline-flex h-14 w-full max-w-sm items-center justify-center overflow-hidden rounded-xl bg-cyan-500 px-8 font-semibold text-[#0f0f1a] transition-all hover:bg-cyan-400 hover:shadow-[0_0_40px_rgba(34,211,238,0.4)] disabled:opacity-50">
        <span *ngIf="!isLoading" class="flex items-center gap-2">Scanner l'Arène</span>
        <span *ngIf="isLoading" class="animate-pulse">Analyse...</span>
      </button>
    </div>

    <div class="bg-[#161625] border border-white/5 rounded-3xl p-6 shadow-2xl">
      <h3 class="text-sm font-medium text-slate-400 uppercase tracking-widest border-b border-white/10 pb-4 mb-4">Experts</h3>
      <ul class="space-y-4">
        <li *ngFor="let tech of [
          {id: 1, name: 'PHP', color: 'text-cyan-400'},
          {id: 2, name: 'ReactJS', color: 'text-blue-400'},
          {id: 3, name: 'C++', color: 'text-purple-400'},
          {id: 4, name: 'C#', color: 'text-emerald-400'},
          {id: 5, name: 'Mobile', color: 'text-orange-400'}
        ]" class="flex items-center justify-between p-3 rounded-lg bg-white/5">
          <span class="text-white font-medium">{{ team?.experts[tech.id] }}</span>
          <span class="text-[10px] px-2 py-1 rounded border border-white/10" [ngClass]="tech.color">{{ tech.name }}</span>
        </li>
      </ul>
      <button (click)="logout()" class="w-full mt-8 py-2 text-xs text-slate-500 hover:text-white transition-colors">Déconnexion</button>
    </div>
  </div>
</div>
