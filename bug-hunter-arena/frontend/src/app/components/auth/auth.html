<div class="min-h-screen bg-[#0f0f1a] text-slate-200 font-sans flex items-center justify-center p-4 relative overflow-hidden">
  
  <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-cyan-500/10 blur-[100px] rounded-full pointer-events-none"></div>
  <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-purple-500/10 blur-[100px] rounded-full pointer-events-none"></div>

  <div class="relative z-10 w-full max-w-md bg-[#161625] border border-white/5 rounded-2xl p-8 shadow-2xl">
    
    <div class="text-center mb-8">
      <div class="inline-flex h-12 w-12 rounded-xl border border-white/10 bg-white/5 items-center justify-center mb-4">
        <iconify-icon icon="solar:bug-minimalistic-linear" class="text-2xl text-cyan-400"></iconify-icon>
      </div>
      <h2 class="text-2xl font-semibold text-white tracking-tight">
        {{ isLoginMode ? 'Accès à l\'Arène' : 'Nouvelle Escouade' }}
      </h2>
      <p class="text-sm text-slate-400 mt-2">
        {{ isLoginMode ? 'Identifiez votre équipe pour continuer' : 'Enregistrez vos experts dans la base' }}
      </p>
    </div>

    <div class="flex bg-black/40 p-1 rounded-lg mb-8 border border-white/5">
      <button (click)="isLoginMode = true" 
              [class.bg-white/10]="isLoginMode" [class.text-white]="isLoginMode"
              class="flex-1 py-2 text-sm font-medium rounded-md text-slate-400 transition-all">
        Connexion
      </button>
      <button (click)="isLoginMode = false" 
              [class.bg-white/10]="!isLoginMode" [class.text-white]="!isLoginMode"
              class="flex-1 py-2 text-sm font-medium rounded-md text-slate-400 transition-all">
        Inscription
      </button>
    </div>

    <div *ngIf="errorMessage" class="mb-6 p-3 bg-red-500/10 border border-red-500/20 rounded-lg text-red-400 text-xs text-center">
      {{ errorMessage }}
    </div>

    <form (ngSubmit)="onSubmit()" class="space-y-4">
      <div>
        <label class="block text-xs font-medium text-slate-400 mb-1.5 uppercase tracking-wider">Nom de l'escouade</label>
        <input type="text" name="name" [(ngModel)]="formData.name" required
               placeholder="Ex: Les Debuggeurs Fous" 
               class="w-full bg-[#0f0f1a] border border-white/10 rounded-lg py-2.5 px-4 text-sm text-white focus:outline-none focus:border-cyan-500 transition-all">
      </div>

      <div>
        <label class="block text-xs font-medium text-slate-400 mb-1.5 uppercase tracking-wider">Code d'accès</label>
        <input type="password" name="password" [(ngModel)]="formData.password" required
               placeholder="••••••••" 
               class="w-full bg-[#0f0f1a] border border-white/10 rounded-lg py-2.5 px-4 text-sm text-white focus:outline-none focus:border-cyan-500 transition-all">
      </div>

      <div *ngIf="!isLoginMode" class="pt-4 space-y-4 border-t border-white/5 animate-in fade-in duration-500">
        <p class="text-[10px] font-bold text-cyan-500 uppercase tracking-[0.2em] mb-2">Assignation des Experts</p>
        
        <div class="grid grid-cols-1 gap-3">
          <div class="relative">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-[10px] font-bold text-slate-600">PHP</span>
            <input type="text" name="expert1" [(ngModel)]="formData.experts[1]" placeholder="Nom de l'expert"
                   class="w-full bg-[#0f0f1a] border border-white/10 rounded-lg py-2 pl-12 pr-4 text-xs text-white focus:border-cyan-500 outline-none">
          </div>
          
          <div class="relative">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-[10px] font-bold text-slate-600">REACT</span>
            <input type="text" name="expert2" [(ngModel)]="formData.experts[2]" placeholder="Nom de l'expert"
                   class="w-full bg-[#0f0f1a] border border-white/10 rounded-lg py-2 pl-12 pr-4 text-xs text-white focus:border-cyan-500 outline-none">
          </div>

          <div class="relative">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-[10px] font-bold text-slate-600">C++</span>
            <input type="text" name="expert3" [(ngModel)]="formData.experts[3]" placeholder="Nom de l'expert"
                   class="w-full bg-[#0f0f1a] border border-white/10 rounded-lg py-2 pl-12 pr-4 text-xs text-white focus:border-cyan-500 outline-none">
          </div>

          <div class="relative">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-[10px] font-bold text-slate-600">C#</span>
            <input type="text" name="expert4" [(ngModel)]="formData.experts[4]" placeholder="Nom de l'expert"
                   class="w-full bg-[#0f0f1a] border border-white/10 rounded-lg py-2 pl-12 pr-4 text-xs text-white focus:border-cyan-500 outline-none">
          </div>

          <div class="relative">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-[10px] font-bold text-slate-600">MOBILE</span>
            <input type="text" name="expert5" [(ngModel)]="formData.experts[5]" placeholder="Nom de l'expert"
                   class="w-full bg-[#0f0f1a] border border-white/10 rounded-lg py-2 pl-12 pr-4 text-xs text-white focus:border-cyan-500 outline-none">
          </div>
        </div>
      </div>

      <button type="submit" 
              class="w-full mt-6 flex items-center justify-center gap-2 bg-gradient-to-r from-cyan-500 to-purple-500 hover:from-cyan-400 hover:to-purple-400 text-[#0f0f1a] py-3 rounded-lg text-sm font-bold tracking-wide transition-all shadow-[0_0_20px_rgba(34,211,238,0.2)] active:scale-[0.98]">
        {{ isLoginMode ? 'DÉVERROUILLER L\'ACCÈS' : 'INITIALISER L\'ESCOUADE' }}
      </button>
    </form>
  </div>
</div>
