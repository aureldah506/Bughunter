<div class="min-h-screen bg-[#0f0f1a] text-slate-200 font-sans p-4 md:p-8 flex flex-col items-center relative overflow-hidden">
  
  <div class="absolute bottom-0 left-0 w-full h-1/2 bg-gradient-to-t from-cyan-900/10 to-transparent pointer-events-none"></div>

  <div class="w-full max-w-4xl flex justify-between items-end mb-8 border-b border-white/10 pb-4 relative z-10">
    <div>
      <p class="text-xs text-slate-500 uppercase tracking-widest mb-1">Connexion établie : {{ teamName }}</p>
      <h2 class="text-2xl font-bold text-white flex items-center gap-2">
        <iconify-icon icon="solar:user-id-linear" class="text-cyan-400"></iconify-icon>
        Expert en ligne : <span class="text-cyan-400">{{ expertName }}</span>
      </h2>
    </div>
    <div class="bg-[#161625] border border-white/10 px-4 py-2 rounded-lg shadow-lg">
      <span class="text-slate-400 text-xs uppercase font-medium tracking-wider">Score actuel</span>
      <span class="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-cyan-400 ml-3">{{ currentScore }}</span>
    </div>
  </div>

  <div class="w-full max-w-4xl bg-[#161625] border border-white/5 rounded-2xl p-6 md:p-8 shadow-2xl relative overflow-hidden z-10">

    <div *ngIf="feedbackMessage" 
         class="absolute inset-0 z-20 flex flex-col items-center justify-center bg-[#0f0f1a]/95 backdrop-blur-md transition-all"
         [ngClass]="{'border-t-4 border-t-green-500': isCorrect, 'border-t-4 border-t-red-500': !isCorrect}">
      
      <iconify-icon [icon]="isCorrect ? 'solar:check-circle-bold-duotone' : 'solar:danger-triangle-bold-duotone'" 
                    [class]="isCorrect ? 'text-green-500 text-7xl mb-6 shadow-green-500/50' : 'text-red-500 text-7xl mb-6 shadow-red-500/50'"></iconify-icon>
      
      <h2 class="text-3xl font-black tracking-widest uppercase mb-2" 
          [ngClass]="{'text-green-400': isCorrect, 'text-red-400': !isCorrect}">
        {{ isCorrect ? 'Système Restauré' : 'Échec Critique' }}
      </h2>
      <p class="text-lg text-slate-300">{{ feedbackMessage }}</p>
      
      <div class="mt-12 flex items-center gap-2 text-xs text-slate-500 animate-pulse font-mono uppercase">
        <iconify-icon icon="solar:restart-linear"></iconify-icon>
        Extraction de l'expert en cours...
      </div>
    </div>

    <div class="mb-8">
      <div class="flex items-center gap-2 px-4 py-2 bg-[#0a0a10] rounded-t-lg border border-white/10 border-b-0">
        <div class="w-3 h-3 rounded-full bg-red-500/80"></div>
        <div class="w-3 h-3 rounded-full bg-yellow-500/80"></div>
        <div class="w-3 h-3 rounded-full bg-green-500/80"></div>
        <span class="text-xs text-slate-500 ml-3 font-mono">/var/log/anomalie_detectee.{{ techName | lowercase }}</span>
      </div>
      <div class="bg-[#050508] border border-white/10 rounded-b-lg p-6 font-mono text-sm md:text-base text-cyan-50 shadow-inner overflow-x-auto whitespace-pre-wrap leading-relaxed">
        {{ quiz?.question }}
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <button *ngFor="let answer of quiz?.answers" 
              (click)="submitAnswer(answer.id)" 
              [disabled]="isSubmitting"
              class="text-left bg-white/5 hover:bg-white/10 border border-white/10 hover:border-cyan-500/50 p-5 rounded-xl transition-all group disabled:opacity-50 disabled:cursor-not-allowed">
        <div class="flex items-start gap-4">
          <div class="mt-0.5 text-cyan-600 group-hover:text-cyan-400 transition-colors">
            <iconify-icon icon="solar:alt-arrow-right-line-duotone" class="text-xl"></iconify-icon>
          </div>
          <span class="text-sm font-medium text-slate-300 group-hover:text-white transition-colors leading-relaxed">
            {{ answer.text }}
          </span>
        </div>
      </button>
    </div>

  </div>
</div>
